<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Floppy Disk Background -->
  <rect x="2" y="2" width="28" height="28" rx="2" fill="#000080" />
  <!-- Bevel highlighting -->
  <path d="M 2 2 L 30 2 L 30 4 L 4 4 L 4 30 L 2 30 Z" fill="#80b3ff" />
  <path d="M 30 2 L 30 30 L 2 30 L 2 28 L 28 28 L 28 2 L 30 2 Z" fill="#000040" />

  <!-- Label (White area) -->
  <rect x="6" y="4" width="20" height="11" fill="#ffffff" />
  <!-- Write lines on label -->
  <rect x="8" y="7" width="16" height="1" fill="#ff00ff" />
  <rect x="8" y="10" width="16" height="1" fill="#00ffff" />
  <rect x="8" y="13" width="12" height="1" fill="#ffaa00" />

  <!-- Shutter (Silver sliding part at the bottom) -->
  <rect x="10" y="18" width="12" height="12" fill="#c0c0c0" />
  <!-- Shutter bevel -->
  <path d="M 10 18 L 22 18 L 22 19 L 11 19 L 11 30 L 10 30 Z" fill="#ffffff" />
  <path d="M 22 18 L 22 30 L 10 30 L 10 29 L 21 29 L 21 18 Z" fill="#808080" />
  <!-- Shutter slot cutout -->
  <rect x="14" y="21" width="4" height="6" fill="#000000" />

  <!-- Write-protect notch (bottom right cutout) -->
  <rect x="25" y="27" width="3" height="3" fill="#000000" />
</svg>
